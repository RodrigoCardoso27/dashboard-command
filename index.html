<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Command Center</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0f172a;
--panel:#020617;
--accent:#3b82f6;
--text:#ffffff;
--muted:#94a3b8;
}

[data-theme="light"]{
--bg:#f1f5f9;
--panel:#ffffff;
--accent:#2563eb;
--text:#020617;
--muted:#64748b;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter,Arial;
}

body{
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
}

.sidebar{
width:230px;
background:var(--panel);
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.logo{
font-size:18px;
font-weight:700;
margin-bottom:20px;
}

.nav{
padding:10px;
border-radius:8px;
cursor:pointer;
}

.nav:hover{
background:rgba(255,255,255,0.05);
}

.main{
flex:1;
padding:30px;
overflow:auto;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:var(--panel);
padding:20px;
border-radius:10px;
}

.card h3{
font-size:14px;
color:var(--muted);
}

.card p{
font-size:28px;
margin-top:8px;
font-weight:700;
}

form{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

input,select{
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
background:var(--accent);
color:white;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.delete{
cursor:pointer;
color:red;
}

.login{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

.login-box{
background:var(--panel);
padding:40px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:10px;
width:280px;
}

.search{
margin-bottom:15px;
}

</style>
</head>

<body>

<div id="login" class="login">

<div class="login-box">

<h2>Login</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

</div>

<div id="app" style="display:none; width:100%;">

<div class="sidebar">

<div class="logo">Command Center</div>

<div class="nav" onclick="view('dash')">Dashboard</div>
<div class="nav" onclick="view('registro')">Registrar</div>
<div class="nav" onclick="view('consulta')">Consulta</div>

<button onclick="toggleTheme()">Tema</button>

</div>

<div class="main">

<div class="top">

<div>
<h2>Command Center</h2>
<span id="userName"></span>
</div>

<button onclick="logout()">Sair</button>

</div>

<div id="dash">

<div class="cards">

<div class="card">
<h3>Resolvidos</h3>
<p id="kpiResolvido">0</p>
</div>

<div class="card">
<h3>Reabertos</h3>
<p id="kpiReaberto">0</p>
</div>

<div class="card">
<h3>Escalados</h3>
<p id="kpiEscalado">0</p>
</div>

<div class="card">
<h3>Cancelados</h3>
<p id="kpiCancelado">0</p>
</div>

</div>

<canvas id="grafico"></canvas>

</div>

<div id="registro" style="display:none">

<h3>Registrar RITM</h3>

<form onsubmit="salvar(event)">

<input id="ritm" placeholder="RITM000123" required>

<select id="status">

<option>Resolvido</option>
<option>Reaberto</option>
<option>Escalado</option>
<option>Cancelado (Abertura Incorreta)</option>
<option>Cancelado (A pedido do solicitante)</option>

</select>

<input id="obs" placeholder="Observação">

<button>Salvar</button>

</form>

</div>

<div id="consulta" style="display:none">

<h3>Consulta</h3>

<input class="search" id="buscar" placeholder="Buscar RITM..." onkeyup="render()">

<table>

<thead>
<tr>
<th>Data</th>
<th>RITM</th>
<th>Analista</th>
<th>Status</th>
<th></th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAG-d9URUUArNworWOaIMhavnVYNwUfEW0",
authDomain: "dashboard-command-1ef72.firebaseapp.com",
databaseURL: "https://dashboard-command-1ef72-default-rtdb.firebaseio.com",
projectId: "dashboard-command-1ef72",
storageBucket: "dashboard-command-1ef72.firebasestorage.app",
messagingSenderId: "38631596446",
appId: "1:38631596446:web:f9470a5b648173e168b68f"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let usuario=null;
let dados={};

function view(v){

document.getElementById("dash").style.display="none"
document.getElementById("registro").style.display="none"
document.getElementById("consulta").style.display="none"

document.getElementById(v).style.display="block"

}

function toggleTheme(){

let t=document.body.getAttribute("data-theme")

if(t=="light"){
document.body.removeAttribute("data-theme")
}else{
document.body.setAttribute("data-theme","light")
}

}

function login(){

let u=document.getElementById("user").value.toUpperCase()
let p=document.getElementById("pass").value

db.ref("usuarios/"+u).once("value").then(snap=>{

let val=snap.val()

if(!val) return alert("Usuário não encontrado")

if(val.senha!=p) return alert("Senha incorreta")

usuario={
nome:val.nomeCompleto,
login:u,
role:val.role
}

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="flex"

document.getElementById("userName").innerText=usuario.nome

carregar()

})

}

function logout(){
location.reload()
}

function salvar(e){

e.preventDefault()

let ritm=document.getElementById("ritm").value
let status=document.getElementById("status").value
let obs=document.getElementById("obs").value

let ref=db.ref("command/registros")

ref.orderByChild("ritm").equalTo(ritm).once("value").then(snap=>{

if(snap.exists()){

snap.forEach(c=>{
ref.child(c.key).update({
status,
obs,
data:new Date().toLocaleDateString(),
analista:usuario.nome
})
})

}else{

ref.push({
ritm,
status,
obs,
data:new Date().toLocaleDateString(),
analista:usuario.nome
})

}

})

}

function carregar(){

db.ref("command/registros").on("value",snap=>{

dados={}

snap.forEach(i=>{
dados[i.key]=i.val()
})

render()

})

}

function render(){

let resolvido=0
let reaberto=0
let escalado=0
let cancelado=0

let tbody=document.getElementById("tabela")
tbody.innerHTML=""

let busca=document.getElementById("buscar")?.value?.toLowerCase() || ""

Object.entries(dados).forEach(([k,d])=>{

if(d.ritm.toLowerCase().includes(busca)==false) return

if(d.status=="Resolvido") resolvido++
if(d.status=="Reaberto") reaberto++
if(d.status=="Escalado") escalado++
if(d.status.includes("Cancelado")) cancelado++

tbody.innerHTML+=`
<tr>
<td>${d.data}</td>
<td>${d.ritm}</td>
<td>${d.analista}</td>
<td>${d.status}</td>
<td>${usuario.role=="admin"?`<span class="delete" onclick="del('${k}')">🗑</span>`:""}</td>
</tr>
`

})

document.getElementById("kpiResolvido").innerText=resolvido
document.getElementById("kpiReaberto").innerText=reaberto
document.getElementById("kpiEscalado").innerText=escalado
document.getElementById("kpiCancelado").innerText=cancelado

grafico()

}

function del(id){

if(!confirm("Excluir registro?")) return

db.ref("command/registros/"+id).remove()

}

let chart

function grafico(){

let analistas={}

Object.values(dados).forEach(d=>{
analistas[d.analista]=(analistas[d.analista]||0)+1
})

let ctx=document.getElementById("grafico")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(analistas),
datasets:[{
data:Object.values(analistas),
backgroundColor:"#3b82f6"
}]
}
})

}

</script>

</body>
</html>
