<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Omni TI - Service Desk</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* Estilo Corporativo Omni (Azul e Branco) */
    :root { --bg: #f8fafc; --panel: #ffffff; --text: #0f172a; --brand: #0284c7; --danger: #ef4444; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
    .sidebar { width: 260px; height: 100vh; background: #0f172a; color: white; padding: 20px; position: fixed; }
    .main { margin-left: 260px; width: calc(100% - 260px); padding: 30px; }
    .card { background: var(--panel); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin: 8px 0; }
    .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
    .btn-primary { background: var(--brand); color: white; }
    .view { display: none; }
    .active { display: block; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>Omni TI</h3>
  <div onclick="showView('dash')" style="margin-top:20px; cursor:pointer;">📊 Dashboard</div>
  <div onclick="showView('consult')" style="margin-top:10px; cursor:pointer;">🔍 Histórico</div>
  <div onclick="logout()" style="margin-top:50px; color:var(--danger); cursor:pointer;">Sair</div>
</div>

<div class="main">
  <div id="dash" class="view active">
    <div class="card">
        <h2>Registrar Serviço</h2>
        <input type="text" id="ticket" placeholder="Ticket">
        <textarea id="desc" placeholder="Descrição"></textarea>
        <button class="btn btn-primary" onclick="salvarServico()">SALVAR</button>
    </div>
  </div>
  
  <div id="consult" class="view">
    <div class="card">
        <h2>Histórico de Atendimentos</h2>
        <table id="tabelaHist"></table>
    </div>
  </div>
</div>

<script>
    const app = firebase.initializeApp({ databaseURL: "https://dashboard-command-1ef72-default-rtdb.firebaseio.com" });
    const db = app.database();

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function salvarServico() {
        const data = { ticket: document.getElementById('ticket').value, desc: document.getElementById('desc').value };
        await db.ref('atendimentos_ti').push(data);
        alert("Salvo!");
    }

    function logout() { localStorage.clear(); location.reload(); }

    // Lógica de Login que você estava usando
    window.onload = () => {
        if(!localStorage.getItem('login')) {
            const u = prompt("Usuário:");
            const p = prompt("Senha:");
            db.ref('usuarios').once('value', snap => {
                let ok = false;
                snap.forEach(c => {
                    if(c.key.toLowerCase() === u.toLowerCase() && String(c.val().senha) === String(p)) {
                        localStorage.setItem('login', 'ok');
                        location.reload();
                        ok = true;
                    }
                });
                if(!ok) alert("Erro de login");
            });
        }
    };
</script>
</body>
</html>
