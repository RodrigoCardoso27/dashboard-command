<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Command Center</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#020617;
padding:25px;
display:flex;
flex-direction:column;
gap:15px;
}

.logo{
font-size:20px;
font-weight:700;
margin-bottom:30px;
}

.menu{
padding:10px;
border-radius:8px;
cursor:pointer;
}

.menu:hover{
background:#1e293b;
}

/* MAIN */

.main{
flex:1;
padding:30px;
overflow:auto;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

/* KPI */

.kpis{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#020617;
padding:20px;
border-radius:12px;
}

.card h4{
font-size:13px;
color:#94a3b8;
}

.card h2{
margin-top:8px;
}

/* GRÁFICOS */

.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:40px;
}

/* FORM */

form{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

input,select{
padding:10px;
border-radius:6px;
border:none;
width:200px;
}

button{
background:#3b82f6;
border:none;
padding:10px 20px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
text-align:left;
padding:12px;
background:#020617;
}

td{
padding:12px;
border-bottom:1px solid #1e293b;
}

tr:hover{
background:#020617;
}

.search{
margin-bottom:15px;
padding:10px;
width:300px;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">Command Center</div>

<div class="menu" onclick="mostrar('dashboard')">Dashboard</div>
<div class="menu" onclick="mostrar('registro')">Registrar</div>
<div class="menu" onclick="mostrar('consulta')">Consulta</div>

</div>

<div class="main">

<div class="header">
<h2>Painel de Controle</h2>
</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="kpis">

<div class="card">
<h4>Resolvidos</h4>
<h2 id="kpiResolvido">0</h2>
</div>

<div class="card">
<h4>Reabertos</h4>
<h2 id="kpiReaberto">0</h2>
</div>

<div class="card">
<h4>Escalados</h4>
<h2 id="kpiEscalado">0</h2>
</div>

<div class="card">
<h4>Cancelados</h4>
<h2 id="kpiCancelado">0</h2>
</div>

<div class="card">
<h4>Total Hoje</h4>
<h2 id="kpiHoje">0</h2>
</div>

<div class="card">
<h4>Total Geral</h4>
<h2 id="kpiTotal">0</h2>
</div>

</div>

<div class="charts">

<canvas id="graficoStatus"></canvas>
<canvas id="graficoAnalista"></canvas>

</div>

</div>

<!-- REGISTRO -->

<div id="registro" style="display:none">

<h3>Registrar RITM</h3>

<form onsubmit="salvar(event)">

<input id="ritm" placeholder="RITM000123" required>

<select id="status">

<option>Resolvido</option>
<option>Reaberto</option>
<option>Escalado</option>
<option>Cancelado (Abertura Incorreta)</option>
<option>Cancelado (A pedido do solicitante)</option>

</select>

<input id="analista" placeholder="Analista">

<input id="obs" placeholder="Observação">

<button>Salvar</button>

</form>

</div>

<!-- CONSULTA -->

<div id="consulta" style="display:none">

<h3>Consulta</h3>

<input class="search" id="busca" placeholder="Buscar RITM..." onkeyup="render()">

<table>

<thead>

<tr>
<th>Data</th>
<th>RITM</th>
<th>Analista</th>
<th>Status</th>
<th>Obs</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAG-d9URUUArNworWOaIMhavnVYNwUfEW0",
authDomain: "dashboard-command-1ef72.firebaseapp.com",
databaseURL: "https://dashboard-command-1ef72-default-rtdb.firebaseio.com",
projectId: "dashboard-command-1ef72",
storageBucket: "dashboard-command-1ef72.firebasestorage.app",
messagingSenderId: "38631596446",
appId: "1:38631596446:web:f9470a5b648173e168b68f"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.database()

let registros={}

function mostrar(p){

document.getElementById("dashboard").style.display="none"
document.getElementById("registro").style.display="none"
document.getElementById("consulta").style.display="none"

document.getElementById(p).style.display="block"

}

function salvar(e){

e.preventDefault()

let ritm=document.getElementById("ritm").value
let status=document.getElementById("status").value
let analista=document.getElementById("analista").value
let obs=document.getElementById("obs").value
let data=new Date().toLocaleDateString()

db.ref("command/registros").push({

ritm,
status,
analista,
obs,
data

})

}

function carregar(){

db.ref("command/registros").on("value",snap=>{

registros={}

snap.forEach(i=>{
registros[i.key]=i.val()
})

render()

})

}

function render(){

let resolvido=0
let reaberto=0
let escalado=0
let cancelado=0
let hoje=0

let tabela=document.getElementById("tabela")
tabela.innerHTML=""

let busca=document.getElementById("busca")?.value?.toLowerCase() || ""

let analistas={}

Object.values(registros).forEach(r=>{

if(r.ritm.toLowerCase().includes(busca)==false) return

if(r.status=="Resolvido") resolvido++
if(r.status=="Reaberto") reaberto++
if(r.status=="Escalado") escalado++
if(r.status.includes("Cancelado")) cancelado++

if(r.data==new Date().toLocaleDateString()) hoje++

analistas[r.analista]=(analistas[r.analista]||0)+1

tabela.innerHTML+=`

<tr>
<td>${r.data}</td>
<td>${r.ritm}</td>
<td>${r.analista}</td>
<td>${r.status}</td>
<td>${r.obs}</td>
</tr>

`

})

document.getElementById("kpiResolvido").innerText=resolvido
document.getElementById("kpiReaberto").innerText=reaberto
document.getElementById("kpiEscalado").innerText=escalado
document.getElementById("kpiCancelado").innerText=cancelado
document.getElementById("kpiHoje").innerText=hoje
document.getElementById("kpiTotal").innerText=Object.keys(registros).length

graficoStatus(resolvido,reaberto,escalado,cancelado)
graficoAnalista(analistas)

}

let g1,g2

function graficoStatus(a,b,c,d){

let ctx=document.getElementById("graficoStatus")

if(g1) g1.destroy()

g1=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Resolvido","Reaberto","Escalado","Cancelado"],
datasets:[{
data:[a,b,c,d]
}]
}
})

}

function graficoAnalista(analistas){

let ctx=document.getElementById("graficoAnalista")

if(g2) g2.destroy()

g2=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(analistas),
datasets:[{
data:Object.values(analistas)
}]
}
})

}

carregar()

</script>

</body>
</html>
