<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omni Táxi Aéreo - Service Desk</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #090e17; --panel: #1e293b; --text: #f8fafc; --brand: #0ea5e9; --brand2: #10b981; --danger: #ef4444; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .card { background: var(--panel); padding: 25px; border-radius: 16px; margin: 20px; }
    input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 5px; }
    .btn { padding: 12px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: 700; }
    .btn-primary { background: var(--brand); color: white; }
    #telaLogin { position: fixed; inset: 0; background: #020617; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-card { background: #1e293b; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
  </style>
</head>
<body>

<div id="telaLogin">
  <div class="login-card">
    <div style="font-size: 3rem; margin-bottom: 20px;">🚁</div>
    <h2>Omni Táxi Aéreo</h2>
    <input type="text" id="lUser" placeholder="Usuário" style="margin-bottom: 10px;">
    <input type="password" id="lPass" placeholder="Senha" onkeypress="if(event.key === 'Enter') autenticar()">
    <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="autenticar()">ENTRAR</button>
  </div>
</div>

<div class="main-content" id="painelPrincipal" style="display:none; padding: 20px;">
  <div class="card">
    <h2>Registrar Atendimento</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <input type="text" id="ticketId" placeholder="Ticket">
        <input type="text" id="solicitante" placeholder="Usuário/Setor">
    </div>
    <textarea id="descSolucao" placeholder="Descrição..." style="margin-top: 15px;"></textarea>
    <button class="btn btn-primary" onclick="salvarAtendimento()" style="margin-top: 15px;">SALVAR</button>
    <button class="btn" onclick="logout()" style="background:transparent; color:red; margin-top:15px;">SAIR</button>
  </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAG-d9URUUArNworWOaIMhavnVYNwUfEW0",
        databaseURL: "https://dashboard-command-1ef72-default-rtdb.firebaseio.com",
        projectId: "dashboard-command-1ef72"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // LOGIN BLINDADO
    async function autenticar() {
        const u = document.getElementById('lUser').value.trim();
        const p = document.getElementById('lPass').value.trim();
        
        // Busca TODOS os usuários da pasta 'usuarios' para comparar manualmente
        db.ref('usuarios').once('value', snap => {
            let achou = false;
            snap.forEach(child => {
                const user = child.val();
                // Compara sem case-sensitive (tudo minúsculo)
                if (child.key.toLowerCase() === u.toLowerCase() && String(user.senha) === String(p)) {
                    localStorage.setItem('omni_user', JSON.stringify({nome: u, role: user.role}));
                    location.reload();
                    achou = true;
                }
            });
            if(!achou) alert("Usuário ou Senha incorretos!");
        });
    }

    function salvarAtendimento() {
        const payload = { 
            ticket: document.getElementById('ticketId').value,
            solicitante: document.getElementById('solicitante').value,
            desc: document.getElementById('descSolucao').value,
            data: new Date().toLocaleDateString()
        };
        db.ref('atendimentos_ti').push(payload).then(() => alert("Salvo!"));
    }

    function logout() { localStorage.removeItem('omni_user'); location.reload(); }

    window.onload = () => {
        if(localStorage.getItem('omni_user')) document.getElementById('painelPrincipal').style.display = 'block';
        else document.getElementById('telaLogin').style.display = 'flex';
    };
</script>
</body>
</html>
